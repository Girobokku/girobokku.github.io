              <input type="text" id="surname2" name="surname2" placeholder="De Hyrule" size="35">

              <input type="url" name="url" id="url" placeholder="https://LinkNecesitaVacaciones.com" pattern="https://.*" size="35" required>
              <label for="personalweb">&#127758; Web Personal</label><br><br>
        
              <input type="text" id="height" name="height" maxlength="3" size="35" placeholder="The Legend of Zelda: Majora's Mask">

              <input type="date" id="birthday" size="35">
              <label for="birthday">&#127874; Cumpleaños</label><br><br>
        
              <input type="radio" id="male" name="gender" value="male">
              <label for="male">&#128105; Mujer</label><br>
              <input type="radio" id="female" name="gender" value="female">
              <label for="female">&#128104; Hombre</label><br><br>
        
              <input type="color" id="favcolor" value="00080">
              <label for="favcolor">Color favorito</label><br><br>
        
              <input type="Checkbox" id="terms" name="terms" required="">
              <label for="terms">Acepto los términos y condiciones.</label><br><br>
        
              <input type="button" onclick="alert('¿Está de acuerdo con los datos recogidos?')" value="Enviar">
